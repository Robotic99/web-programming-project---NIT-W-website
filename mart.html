<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap" rel="stylesheet">
  <title>NIT Mart</title>
  <style>
    * { box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(180deg, #2b2d31, #232428);
      color: white;
      display: flex;
      flex-direction: column;
    }

    /* NAVBAR */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 24px;
      backdrop-filter: blur(12px);
      background: rgba(30, 31, 34, 0.85);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .navbar-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .home-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.07);
      color: #ccc;
      font-size: 0.78rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Poppins', sans-serif;
    }
    .home-btn:hover {
      background: rgba(255,255,255,0.14);
      color: white;
      border-color: rgba(255,255,255,0.3);
    }

    .navbar-title {
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: 0.5px;
    }

    /* SEARCH + CART */
    .search-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
      margin: 25px;
    }

    .search-row input {
      width: 40%;
      padding: 14px;
      border-radius: 30px;
      border: none;
      outline: none;
      background: #e5e5e5;
      color: black;
      font-size: 14px;
    }

    .cart-btn {
      padding: 12px 18px;
      border-radius: 25px;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, #3ba55c, #2d7d46);
      color: white;
      font-weight: 600;
      transition: 0.2s;
    }
    .cart-btn:hover { transform: scale(1.05); }

    /* CATEGORY */
    #categories {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    #categories button {
      padding: 10px 18px;
      border-radius: 25px;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, #5865f2, #4752c4);
      color: white;
      transition: 0.2s;
    }
    #categories button:hover { transform: scale(1.08); }

    /* PRODUCTS GRID */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      padding: 20px 40px;
    }

    /* PRODUCT CARD */
    .product-card {
      background: linear-gradient(145deg, #1e1f22, #25262b);
      padding: 12px;
      border-radius: 14px;
      transition: 0.25s;
      box-shadow: 0 3px 12px rgba(0,0,0,0.3);
    }
    .product-card:hover { transform: translateY(-5px); }

    .product-img {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: contain;
      background: #ffffff;
      border-radius: 10px;
      padding: 8px;
      margin-bottom: 8px;
    }

    button {
      padding: 8px 12px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      background: #5865f2;
      color: white;
      font-weight: 500;
      transition: 0.2s;
    }
    button:hover { transform: scale(1.05); }

    .qty-box {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    /* CART PAGE */
    .cart-page {
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .cart-topbar {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 20px;
      border-bottom: 1px solid #3f4147;
    }

    .back-btn {
      padding: 10px 14px;
      border-radius: 10px;
      background: linear-gradient(135deg, #5865f2, #4752c4);
    }

    .cart { padding: 20px; }

    .cart-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
    }

    .cart-total {
      padding: 10px 30px;
      font-size: 20px;
      font-weight: 700;
    }

    .checkout-bar {
      margin-top: auto;
      padding: 15px;
      background: #1e1f22;
      border-top: 1px solid #3f4147;
      display: flex;
      justify-content: center;
    }

    .checkout-btn {
      width: 40%;
      padding: 14px;
      font-size: 16px;
      border-radius: 12px;
      background: linear-gradient(135deg, #5865f2, #4752c4);
    }

    /* FOOTER */
    .footer {
      padding: 20px;
      background: #121316;
      text-align: center;
      color: #9ca3af;
    }

    #products, #cartPage { flex: 1; }

    .hidden { display: none; }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <div class="navbar-left">
      <a href="index.html" class="home-btn">← Home</a>
      <span class="navbar-title">🛒 NIT-W Mart</span>
    </div>
  </div>

  <!-- SEARCH + CART -->
  <div class="search-row">
    <input id="searchInput" placeholder="Search products..." onkeyup="renderProducts()">
    <button class="cart-btn" onclick="goCart()">
      🧺 <span id="cartCount">0</span>
    </button>
  </div>

  <!-- CATEGORIES -->
  <div id="categories"></div>

  <!-- PRODUCTS -->
  <div id="products" class="product-grid"></div>

  <!-- CART PAGE -->
  <div id="cartPage" class="cart-page hidden">
    <div class="cart-topbar">
      <button class="back-btn" onclick="goHome()">← Back</button>
      <h2>🧺 Your Cart</h2>
    </div>
    <div id="cartItems" class="cart"></div>
    <div id="total" class="cart-total"></div>
    <div class="checkout-bar">
      <button class="checkout-btn" onclick="placeOrder()">Place Order</button>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    © 2026 NITW Mart &nbsp;·&nbsp; Campus Shopping Made Easy
  </div>

  <script>
    let cart = []
    let category = "All"

    const products = [
      { id: 1, name: "Maggi", price: 14, category: "Snacks", img: "maggi-masala-noodles-311084_l.jpg" },
      { id: 2, name: "Milk", price: 28, category: "Dairy", img: "amul-taaza-toned-milk-1-l-pouch-product-images-o590000597-p590049233-0-202510091903.webp" },
      { id: 3, name: "Bread", price: 40, category: "Dairy", img: "bread.jpg" },
      { id: 4, name: "Eggs", price: 72, category: "Dairy", img: "eggs.jpg" },
      { id: 5, name: "Biscuits", price: 10, category: "Snacks", img: "biscuits.jpg" },
      { id: 6, name: "Rice", price: 40, category: "Groceries", img: "rice.jpg" },
      { id: 7, name: "Soap", price: 30, category: "Daily", img: "soap.jpg" },
      { id: 8, name: "Shampoo", price: 120, category: "Daily", img: "shampoo.jpg" },
      { id: 9, name: "Chips", price: 20, category: "Snacks", img: "chips.webp" }
    ]

    function renderCategories() {
      const cats = ["All", "Snacks", "Dairy", "Groceries", "Daily"]
      const div = document.getElementById("categories")
      div.innerHTML = ""
      cats.forEach(c => {
        div.innerHTML += `<button onclick="setCategory('${c}')">${c}</button>`
      })
    }

    function setCategory(cat) {
      category = cat
      renderProducts()
    }

    function renderProducts() {
      const search = document.getElementById("searchInput").value.toLowerCase()
      const container = document.getElementById("products")
      container.innerHTML = ""

      const filtered = products.filter(p =>
        (category === "All" || p.category === category) &&
        p.name.toLowerCase().includes(search)
      )

      filtered.forEach(p => {
        const qty = getQty(p.id)
        let html = `
          <img src="${p.img}" class="product-img">
          <h3>${p.name}</h3>
          <p>₹${p.price}</p>
        `
        if (qty === 0) {
          html += `<button onclick="add(${p.id})">Add</button>`
        } else {
          html += `
            <div class="qty-box">
              <button onclick="dec(${p.id})">-</button>
              <span>${qty}</span>
              <button onclick="inc(${p.id})">+</button>
            </div>
          `
        }
        const div = document.createElement("div")
        div.className = "product-card"
        div.innerHTML = html
        container.appendChild(div)
      })
    }

    function getQty(id) {
      const item = cart.find(i => i.id === id)
      return item ? item.qty : 0
    }

    function add(id) {
      const item = cart.find(i => i.id === id)
      if (item) item.qty++
      else cart.push({ id, qty: 1 })
      update()
    }

    function inc(id) {
      cart.find(i => i.id === id).qty++
      update()
    }

    function dec(id) {
      cart = cart.map(i =>
        i.id === id ? { ...i, qty: i.qty - 1 } : i
      ).filter(i => i.qty > 0)
      update()
    }

    function update() {
      document.getElementById("cartCount").innerText = cart.length
      renderProducts()
    }

    function goCart() {
      document.getElementById("products").style.display = "none"
      document.getElementById("cartPage").classList.remove("hidden")

      let total = 0
      const div = document.getElementById("cartItems")
      div.innerHTML = ""

      cart.forEach(item => {
        const p = products.find(x => x.id === item.id)
        total += p.price * item.qty
        div.innerHTML += `
          <div class="cart-item">
            <span>${p.name}</span>
            <span>${item.qty} x ₹${p.price}</span>
            <span>₹${item.qty * p.price}</span>
          </div>
        `
      })

      document.getElementById("total").innerText = "Total: ₹" + total
    }

    function goHome() {
      document.getElementById("products").style.display = "grid"
      document.getElementById("cartPage").classList.add("hidden")
    }

    function placeOrder() {
      if (cart.length === 0) {
        alert("Your cart is empty!")
        return
      }
      alert("✅ Order placed successfully!")
      cart = []
      update()
      goHome()
    }

    renderCategories()
    renderProducts()
  </script>

</body>
</html>
